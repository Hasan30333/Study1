<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 뭐 먹지?</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --bg2: #f2ede4;
    --card: #ffffff;
    --ink: #1c1710;
    --ink2: #6b6050;
    --ink3: #a89880;
    --accent: #c84b2f;
    --accent2: #e8703a;
    --gold: #c8922a;
    --border: #e0d8cc;
    --border2: #cfc6b8;
    --shadow: rgba(28,23,16,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── BG TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(200,146,42,0.06) 0%, transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(200,75,47,0.05) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 1;
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .header-eyebrow {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--ink3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Gowun Batang', serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
    letter-spacing: -1px;
  }
  header h1 span {
    color: var(--accent);
  }
  .header-sub {
    margin-top: 12px;
    font-size: 14px;
    color: var(--ink2);
    font-weight: 300;
  }

  /* ── MAIN ── */
  main {
    position: relative; z-index: 1;
    flex: 1;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: 36px 20px 60px;
  }

  /* ── MEAL TABS ── */
  .meal-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--border2);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .tab {
    padding: 14px;
    font-family: 'Gowun Batang', serif;
    font-size: 18px;
    font-weight: 700;
    border: none;
    background: var(--card);
    color: var(--ink3);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .tab + .tab { border-left: 1px solid var(--border2); }
  .tab:hover { color: var(--ink); background: var(--bg2); }
  .tab.active {
    background: var(--ink);
    color: var(--bg);
  }
  .tab.active .tab-icon { opacity: 1; }
  .tab-icon {
    display: inline-block;
    margin-right: 8px;
    font-size: 16px;
    opacity: 0.4;
    transition: opacity 0.2s;
  }

  /* ── CATEGORY CHIPS ── */
  .cat-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--ink3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .cat-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .chip {
    padding: 7px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 400;
    border: 1px solid var(--border2);
    border-radius: 999px;
    background: var(--card);
    color: var(--ink2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 500;
  }

  /* ── RESULT CARD ── */
  .result-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  /* decorative offset shadow card */
  .result-wrap::before {
    content: '';
    position: absolute;
    inset: 6px -6px -6px 6px;
    border: 1px solid var(--border2);
    border-radius: 10px;
    background: var(--bg2);
    z-index: 0;
  }
  .result-card {
    position: relative; z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px 28px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .result-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .result-card.has-result::after { opacity: 1; }

  .empty-msg {
    text-align: center;
    color: var(--ink3);
    font-size: 15px;
    font-weight: 300;
    line-height: 1.8;
  }
  .empty-msg strong {
    display: block;
    font-family: 'Gowun Batang', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink2);
    margin-bottom: 6px;
  }

  .tag-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .tag-meal { background: #fff3e0; color: #b45309; border: 1px solid #fcd34d55; }
  .tag-cat  { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a555; }
  .tag-time { background: #f0fdf4; color: #166534; border: 1px solid #86efac55; }

  .menu-name {
    font-family: 'Gowun Batang', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }
  .menu-desc {
    font-size: 14px;
    color: var(--ink2);
    line-height: 1.75;
    font-weight: 300;
  }

  /* ── SPIN BUTTON ── */
  .btn-spin {
    width: 100%;
    padding: 18px 24px;
    font-family: 'Gowun Batang', serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 12px;
  }
  .btn-spin::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  }
  .btn-spin:hover { background: var(--accent2); }
  .btn-spin:active { transform: scale(0.98); }
  .btn-spin .dice { margin-right: 10px; display: inline-block; transition: transform 0.3s; }
  .btn-spin:hover .dice { transform: rotate(180deg); }

  .btn-again {
    width: 100%;
    padding: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: var(--ink2);
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 32px;
  }
  .btn-again:hover { background: var(--bg2); color: var(--ink); border-color: var(--border); }

  /* ── HISTORY ── */
  .history-wrap { display: none; }
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .history-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--ink3);
    text-transform: uppercase;
  }
  .btn-clear {
    font-size: 11px;
    color: var(--ink3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .btn-clear:hover { color: var(--accent); background: #fef2f2; }

  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    animation: fadeIn 0.25s ease;
  }
  .history-item-left { display: flex; align-items: center; gap: 10px; }
  .history-num {
    width: 22px; height: 22px;
    background: var(--bg2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--ink3);
    font-weight: 500;
    flex-shrink: 0;
  }
  .history-name { font-size: 14px; font-weight: 500; }
  .history-meta { font-size: 12px; color: var(--ink3); }

  /* ── FOOTER ── */
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 20px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--ink3);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { 0%{transform:scale(0.96);opacity:0.7} 60%{transform:scale(1.02)} 100%{transform:scale(1);opacity:1} }
  .popped { animation: pop 0.3s cubic-bezier(.34,1.56,.64,1); }

  @media (max-width: 480px) {
    header { padding: 36px 20px 24px; }
    .menu-name { font-size: 28px; }
    .result-card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<header>
  <p class="header-eyebrow">Daily Meal Picker</p>
  <h1>오늘 <span>뭐</span> 먹지?</h1>
  <p class="header-sub">점심·저녁 메뉴를 랜덤으로 추천해 드려요</p>
</header>

<main>
  <!-- MEAL TYPE TABS -->
  <div class="meal-tabs">
    <button class="tab active" id="tab-lunch" onclick="selectMeal('lunch')">
      <span class="tab-icon">☀️</span>점심
    </button>
    <button class="tab" id="tab-dinner" onclick="selectMeal('dinner')">
      <span class="tab-icon">🌙</span>저녁
    </button>
  </div>

  <!-- CATEGORY FILTER -->
  <p class="cat-label">카테고리</p>
  <div class="cat-row" id="catRow"></div>

  <!-- RESULT -->
  <div class="result-wrap">
    <div class="result-card" id="resultCard">
      <div class="empty-msg" id="emptyMsg">
        <strong>메뉴를 골라드릴게요</strong>
        아래 버튼을 눌러<br>오늘의 메뉴를 추천받아보세요
      </div>
    </div>
  </div>

  <!-- BUTTONS -->
  <button class="btn-spin" onclick="recommend()">
    <span class="dice">🎲</span>메뉴 추천받기
  </button>
  <button class="btn-again" onclick="recommend()" id="btnAgain" style="display:none">
    다른 메뉴 볼게요 →
  </button>

  <!-- HISTORY -->
  <div class="history-wrap" id="historyWrap">
    <div class="history-header">
      <span class="history-title">추천 기록</span>
      <button class="btn-clear" onclick="clearHistory()">초기화</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</main>

<footer>오늘도 맛있는 한 끼 드세요 🍽️</footer>

let selectedMeal = 'lunch';

let history = [];

function getCats() {
  return ['전체', ...Object.keys(menus[selectedMeal])];
}

function renderCats() {
  const row = document.getElementById('catRow');
  row.innerHTML = getCats().map(c =>
    `<button class="chip ${c === selectedCat ? 'active' : ''}" onclick="selectCat('${c}', this)">${c}</button>`
  ).join('');
}

function selectMeal(meal) {
  selectedMeal = meal;
  selectedCat = '전체';
  document.getElementById('tab-lunch').classList.toggle('active', meal === 'lunch');
  document.getElementById('tab-dinner').classList.toggle('active', meal === 'dinner');
  renderCats();
  resetCard();
}

function selectCat(cat, el) {
  selectedCat = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function getPool() {
  const data = menus[selectedMeal];
  if (selectedCat === '전체') {
    return Object.entries(data).flatMap(([cat, items]) => items.map(i => ({ ...i, cat })));
  }
  return (data[selectedCat] || []).map(i => ({ ...i, cat: selectedCat }));
}

function recommend() {
  const pool = getPool();
  if (!pool.length) return;
  let candidates = pool.filter(m => m.name !== lastMenu);
  if (!candidates.length) candidates = pool;
  const picked = candidates[Math.floor(Math.random() * candidates.length)];
  lastMenu = picked.name;
  renderResult(picked);
  addHistory(picked);
  document.getElementById('btnAgain').style.display = 'block';
}

function renderResult(item) {
  const card = document.getElementById('resultCard');
  const mealLabel = selectedMeal === 'lunch' ? '점심' : '저녁';
  card.classList.add('has-result');
  card.innerHTML = `
    <div class="tag-row">
      <span class="tag tag-meal">${mealLabel}</span>
      <span class="tag tag-cat">${item.cat}</span>
      <span class="tag tag-time">⏱ ${item.time}</span>
    </div>
    <div class="menu-name">${item.name}</div>
    <div class="menu-desc">${item.desc}</div>
  `;
  card.classList.remove('popped');
  void card.offsetWidth;
  card.classList.add('popped');
}

function resetCard() {
  const card = document.getElementById('resultCard');
  card.classList.remove('has-result', 'popped');
  card.innerHTML = `
    <div class="empty-msg" id="emptyMsg">
      <strong>메뉴를 골라드릴게요</strong>
      아래 버튼을 눌러<br>오늘의 메뉴를 추천받아보세요
    </div>`;
  document.getElementById('btnAgain').style.display = 'none';
  lastMenu = null;
}

function addHistory(item) {
  const now = new Date();
  const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
  const mealLabel = selectedMeal === 'lunch' ? '점심' : '저녁';
  history.unshift({ name: item.name, cat: item.cat, time, meal: mealLabel });
  if (history.length > 8) history.pop();
  renderHistory();
}

function renderHistory() {
  const wrap = document.getElementById('historyWrap');
  const list = document.getElementById('historyList');
  if (!history.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = history.map((h, i) =>
    `<div class="history-item">
      <div class="history-item-left">
        <span class="history-num">${i + 1}</span>
        <span class="history-name">${h.name}</span>
      </div>
      <span class="history-meta">${h.meal} · ${h.cat} · ${h.time}</span>
    </div>`
  ).join('');
}

function clearHistory() {
  history = [];
  renderHistory();
}

renderCats();
</script>
</body>
</html>
