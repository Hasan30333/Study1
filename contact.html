  .header-sub { margin-top: 12px; font-size: 14px; color: var(--ink2); font-weight: 300; }
  main { position: relative; z-index: 1; flex: 1; width: 100%; max-width: 640px; margin: 0 auto; padding: 36px 20px 60px; }
  .content-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 28px; text-align: center; line-height: 1.8; font-size: 15px; color: var(--ink2); }
  .content-box h2 { font-family: 'Gowun Batang', serif; font-size: 20px; color: var(--ink); margin-bottom: 12px; }
  .content-box a { color: var(--accent); font-weight: 500; text-decoration: none; }
  .content-box a:hover { text-decoration: underline; }
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 24px 20px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--ink3);

  .footer-links {
    display: flex; justify-content: center; gap: 20px; margin-top: 16px;

  }
  .footer-links a { color: var(--ink3); text-decoration: none; font-size: 13px; transition: color 0.2s; padding: 0 5px; }
